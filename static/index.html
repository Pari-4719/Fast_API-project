<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTask // Modern Task Dashboard</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons for modern visuals -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-wind logo-spin"></i>
                </div>
                <h2>ZenTask</h2>
            </div>
            <nav class="nav-links">
                <a href="#" class="active"><i class="fa-solid fa-chart-simple"></i> Dashboard</a>
                <a href="https://fastapi.tiangolo.com/" target="_blank"><i class="fa-solid fa-book"></i> API Docs</a>
            </nav>
            <div class="sidebar-footer">
                <p>FastAPI Backend Active</p>
                <div class="status-indicator online"></div>
            </div>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-title">
                    <h1>Welcome Back</h1>
                    <p class="subtitle">Here's your productive workflow summary</p>
                </div>
                <button class="btn btn-primary" id="btn-open-add-modal">
                    <i class="fa-solid fa-plus"></i> New Task
                </button>
            </header>

            <!-- Stats Dashboard Grid -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon-wrapper blue">
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                    <div class="stat-details">
                        <h3 id="stat-total">0</h3>
                        <p>Total Tasks</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-wrapper orange">
                        <i class="fa-solid fa-spinner"></i>
                    </div>
                    <div class="stat-details">
                        <h3 id="stat-pending">0</h3>
                        <p>In Progress</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-wrapper green">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <div class="stat-details">
                        <h3 id="stat-completed">0</h3>
                        <p>Completed</p>
                    </div>
                </div>
            </section>

            <!-- Controls and Filters -->
            <section class="controls-bar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search tasks by title...">
                </div>
                <div class="filter-group">
                    <div class="select-wrapper">
                        <select id="filter-status">
                            <option value="All">All Statuses</option>
                            <option value="To Do">To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="select-wrapper">
                        <select id="filter-priority">
                            <option value="All">All Priorities</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Task Grid -->
            <section class="task-grid" id="task-grid">
                <!-- Dynamic cards will be rendered here -->
                <div class="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>Loading tasks from API...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Form (Add & Edit) -->
    <div class="modal-backdrop" id="task-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Create New Task</h2>
                <button class="close-btn" id="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="task-form" class="modal-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="form-title">Task Title</label>
                    <input type="text" id="form-title" required placeholder="What needs to be done?" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="form-description">Description</label>
                    <textarea id="form-description" placeholder="Add some context or subtasks..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="form-priority">Priority</label>
                        <select id="form-priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="form-status">Status</label>
                        <select id="form-status">
                            <option value="To Do" selected>To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-due-date">Due Date</label>
                    <input type="date" id="form-due-date">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-task">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script connection -->
    <script src="/static/app.js"></script>
</body>
</html>
